<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; background: #0a0e17; overflow: hidden; height: 100%; }
  canvas { display: block; }
  .edge-frame {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    box-shadow:
      inset 0 0 60px 0px rgba(79, 209, 197, 0.08),
      inset 0 0 18px 2px rgba(79, 209, 197, 0.14);
    animation: framePulse 5s ease-in-out infinite;
  }
  @keyframes framePulse {
    0%, 100% { box-shadow: inset 0 0 60px 0px rgba(79, 209, 197, 0.08), inset 0 0 18px 2px rgba(79, 209, 197, 0.13); }
    50% { box-shadow: inset 0 0 80px 4px rgba(139, 127, 240, 0.11), inset 0 0 24px 3px rgba(139, 127, 240, 0.18); }
  }
  .mock-header { position: fixed; top: 30px; left: 40px; z-index: 3; font-family: -apple-system, sans-serif; }
  .mock-header h1 { font-size: 34px; font-weight: 700; margin: 0; color: #fff; }
  .mock-header h1 span { background: linear-gradient(90deg, #a78bfa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .mock-header p { color: #8b95ad; font-size: 14px; margin-top: 6px; }
  .mock-card {
    position: fixed; background: #10162399; border: 1px solid #232c42;
    border-radius: 14px; backdrop-filter: blur(4px); z-index: 3;
  }
  .card-left-1 { top: 150px; left: 40px; width: 420px; height: 340px; }
  .card-left-2 { top: 510px; left: 40px; width: 420px; height: 260px; }
  .card-right-1 { top: 150px; left: 500px; right: 40px; height: 260px; }
  .card-right-2 { top: 430px; left: 500px; right: 40px; height: 100px; }
</style>
</head>
<body>
<div class="edge-frame"></div>
<div class="mock-header"><h1>AI-Native Enterprise <span>OS</span></h1><p>Multi-agent corporation orchestrator dashboard</p></div>
<div class="mock-card card-left-1"></div>
<div class="mock-card card-left-2"></div>
<div class="mock-card card-right-1"></div>
<div class="mock-card card-right-2"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0e17, 0.018);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(2, -1, 24);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

function glowTexture(hex, size=128) {
  const c = document.createElement('canvas'); c.width = c.height = size;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0, hex + 'ff');
  g.addColorStop(0.35, hex + 'aa');
  g.addColorStop(0.7, hex + '40');
  g.addColorStop(1, hex + '00');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}

const TEAL = '#4fd1c5', AMBER = '#f2a54a', VIOLET = '#a78bfa';

// Weighted toward the empty right/bottom two-thirds of the actual dashboard,
// thinner on the upper-left where the form cards sit.
const nodeDefs = [
  { name: 'orchestrator', color: VIOLET, pos: [17,  7, -5], size: 3.0 },
  { name: 'marketing',    color: TEAL,   pos: [19, -2, -6], size: 2.0 },
  { name: 'finance',      color: TEAL,   pos: [15, -9, -5], size: 2.2 },
  { name: 'human',        color: AMBER,  pos: [ 4,-10.5,-4], size: 2.9, human: true },
  { name: 'engineering',  color: TEAL,   pos: [-9, -9.5,-5], size: 2.0 },
  { name: 'growth',       color: TEAL,   pos: [-15,-1.5,-6], size: 1.7 },
];
const loopOrder = ['orchestrator','marketing','finance','human','engineering','growth','orchestrator'];

const group = new THREE.Group();
scene.add(group);

const nodeSprites = {};
nodeDefs.forEach(def => {
  const halo = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTexture(def.color), transparent: true, depthWrite: false, opacity: 0.5 }));
  halo.position.set(...def.pos);
  halo.scale.set(def.size * 2.2, def.size * 2.2, 1);
  group.add(halo);

  const core = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTexture(def.color), transparent: true, depthWrite: false }));
  core.position.set(...def.pos);
  core.scale.set(def.size, def.size, 1);
  core.userData = def;
  group.add(core);
  nodeSprites[def.name] = core;
});

for (let i = 0; i < loopOrder.length - 1; i++) {
  const pa = nodeSprites[loopOrder[i]].position, pb = nodeSprites[loopOrder[i+1]].position;
  const geo = new THREE.BufferGeometry().setFromPoints([pa, pb]);
  const mat = new THREE.LineBasicMaterial({ color: 0x3d4a72, transparent: true, opacity: 0.6 });
  group.add(new THREE.Line(geo, mat));
}

const starCount = 450;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const x = 4 + Math.random() * 28 - 10;
  const y = (Math.random() - 0.5) * 26;
  starPos[i*3] = x; starPos[i*3+1] = y; starPos[i*3+2] = (Math.random() - 0.5) * 40 - 15;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x445070, size: 0.4, transparent: true, opacity: 0.75 })));

const pulseTex = glowTexture('#ffffff');
const pulses = [];
function spawnPulse(fromName, toName) {
  const from = nodeSprites[fromName], to = nodeSprites[toName];
  const isHuman = toName === 'human';
  const mat = new THREE.SpriteMaterial({ map: pulseTex, transparent: true, depthWrite: false, color: new THREE.Color(isHuman ? AMBER : TEAL) });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(0.7, 0.7, 1);
  group.add(sprite);
  pulses.push({ sprite, from: from.position.clone(), to: to.position.clone(), t: 0, toName, holding: false, holdT: 0 });
}
setInterval(() => {
  const idx = Math.floor(Math.random() * (loopOrder.length - 1));
  const a = loopOrder[idx], b = loopOrder[idx + 1];
  if (Math.random() < 0.5) spawnPulse(a, b); else spawnPulse(b, a);
}, 900);

const clock = new THREE.Clock();
let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  group.rotation.y = Math.sin(elapsed * 0.05) * 0.04;
  camera.position.x += (2 + mouseX * 1.5 - camera.position.x) * 0.02;
  camera.position.y += (-1 - mouseY * 1.2 - camera.position.y) * 0.02;
  camera.lookAt(2, -1, 0);

  Object.values(nodeSprites).forEach(s => {
    const pulseSpeed = s.userData.human ? 1.1 : 2.0;
    const base = s.userData.size;
    const scale = base * (1 + 0.08 * Math.sin(elapsed * pulseSpeed + base));
    s.scale.set(scale, scale, 1);
  });

  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    const holdDuration = p.toName === 'human' ? 1.1 : 0;
    if (!p.holding) {
      p.t += dt * 0.7;
      p.sprite.position.lerpVectors(p.from, p.to, Math.min(p.t, 1));
      p.sprite.material.opacity = 1 - Math.max(0, p.t - 0.85) * 6;
      if (p.t >= 1) {
        if (holdDuration > 0) { p.holding = true; p.holdT = 0; }
        else { group.remove(p.sprite); pulses.splice(i, 1); }
      }
    } else {
      p.holdT += dt;
      const pulse = 1 + 0.35 * Math.sin(p.holdT * 6);
      p.sprite.scale.set(0.7 * pulse, 0.7 * pulse, 1);
      if (p.holdT >= holdDuration) { group.remove(p.sprite); pulses.splice(i, 1); }
    }
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
